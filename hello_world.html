<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <!-- Tailwind CSS を使ってモダンでレスポンシブなデザインを構築 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* アニメーション用の簡単なスタイル */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- メインコンテンツカード -->
    <div class="text-center space-y-8 max-w-md w-full p-8 bg-white rounded-2xl shadow-sm border border-gray-200/80 fade-in">
        <!-- タイトル -->
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 tracking-tight leading-snug">
            心理学実験室へようこそ
        </h1>
        
        <!-- 説明テキスト (UX向上のための追加装飾) -->
        <p class="text-sm md:text-base text-gray-500">
            実験を開始するには、下のボタンを押してください。
        </p>

        <!-- ボタン -->
        <button 
            id="start-btn"
            class="w-full sm:w-auto px-8 py-3.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium rounded-xl shadow-md hover:shadow-lg transition-all duration-200 transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 touch-manipulation"
        >
            実験を開始する
        </button>
    </div>

    <!-- カスタムダイアログボックス (iframe内で動作しない恐れのあるalert()の代替) -->
    <div 
        id="custom-dialog" 
        class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300"
    >
        <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 text-center transform scale-95 transition-transform duration-300">
            <h2 class="text-xl font-bold text-gray-800 mb-4">実験システム</h2>
            <p class="text-gray-600 mb-6 text-lg font-semibold">Hello World!</p>
            <button 
                id="close-dialog-btn"
                class="px-6 py-2 bg-gray-800 hover:bg-gray-900 text-white rounded-lg transition-colors font-medium text-sm focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2"
            >
                閉じる
            </button>
        </div>
    </div>

    <script>
        // DOM要素の取得
        const startBtn = document.getElementById('start-btn');
        const customDialog = document.getElementById('custom-dialog');
        const closeDialogBtn = document.getElementById('close-dialog-btn');
        const dialogCard = customDialog.querySelector('div');

        // ダイアログを表示する関数
        function showDialog() {
            customDialog.classList.remove('hidden');
            // アニメーション用の遅延
            setTimeout(() => {
                customDialog.classList.remove('opacity-0');
                dialogCard.classList.remove('scale-95');
                dialogCard.classList.add('scale-100');
            }, 10);
        }

        // ダイアログを閉じる関数
        function hideDialog() {
            customDialog.classList.add('opacity-0');
            dialogCard.classList.remove('scale-100');
            dialogCard.classList.add('scale-95');
            // フェードアウトアニメーション後に完全に非表示にする
            setTimeout(() => {
                customDialog.classList.add('hidden');
            }, 300);
        }

        // イベントリスナーの登録（タップとクリックの両方に対応）
        startBtn.addEventListener('click', showDialog);
        closeDialogBtn.addEventListener('click', hideDialog);

        // 背景クリックでもダイアログを閉じられるように設定
        customDialog.addEventListener('click', (e) => {
            if (e.target === customDialog) {
                hideDialog();
            }
        });
    </script>
</body>
</html>
