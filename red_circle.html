<!DOCTYPE html>
<html>
<head>
  <title>jsPsych - Circle Response Task</title>
  <meta charset="utf-8">
  <!-- jsPsych core library and plugins via CDN -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    /* 1. 背景色を灰色 (#808080) に設定 */
    body {
      background-color: #808080;
      color: white; /* テキストを見やすくするために白に設定 */
      margin: 0;
      padding: 0;
    }

    /* 2. 直径100pxの赤い円のスタイル */
    .circle-stimulus {
      width: 100px;
      height: 100px;
      background-color: red;
      border-radius: 50%;
      margin: 0 auto;
    }

    /* jsPsychのコンテナ内の要素を中央に配置 */
    .jspsych-content-wrapper {
      background-color: #808080;
    }
  </style>
</head>
<body></body>
<script>
  /**
   * jsPsychの初期化
   */
  const jsPsych = initJsPsych({
    on_finish: function() {
      // 終了時にデータを表示
      jsPsych.data.displayData();
    }
  });

  // タイムラインの定義
  const timeline = [];

  /**
   * 円を表示するトライアル
   * - html-keyboard-responseプラグインを使用
   * - DIVとCSSで円を描画
   * - スペースキーのみを受け付ける
   */
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div class="circle-stimulus"></div>',
    choices: [' '], // 3. スペースキーが押されるまで表示
    prompt: '<p style="margin-top: 40px;">スペースキーを押して終了してください</p>'
  };
  timeline.push(circle_trial);

  /**
   * 4. 終了メッセージ
   */
  const goodbye = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "<h1>終了しました</h1><p>ご協力ありがとうございました。</p>",
    choices: "NO_KEYS",
    trial_duration: 2000
  };
  timeline.push(goodbye);

  /**
   * 実験の実行
   */
  jsPsych.run(timeline);
</script>
</html>
