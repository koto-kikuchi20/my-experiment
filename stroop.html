<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストループ課題 (Stroop Task)</title>
  
  <!-- jsPsychコアライブラリとCSSの読み込み (v7.3系) -->
  <script src="https://unpkg.com/jspsych@7.3.0/dist/index.browser.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css">
  
  <!-- プラグインの読み込み -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2/dist/index.browser.min.js"></script>
  <!-- 参加者情報入力用のプラグインを新規追加 -->
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2/dist/index.browser.min.js"></script>

  <style>
    /* 全体背景色を白に固定し、フォントファミリーを指定 */
    body, html {
      background-color: #FFFFFF !important;
      color: #000000;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    /* jsPsychコンテナのスタイル調整 */
    .jspsych-content-wrapper {
      background-color: #FFFFFF !important;
    }

    /* 教示画面のテキストスタイル (仕様: 24px) */
    .instruction-text {
      font-size: 24px;
      line-height: 1.8;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }

    /* キーボードのキーを模したスタイル */
    kbd {
      background-color: #eeeeee;
      border-radius: 4px;
      border: 1px solid #cccccc;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
      color: #333333;
      display: inline-block;
      font-size: 0.85em;
      font-weight: bold;
      line-height: 1;
      padding: 2px 6px;
      white-space: nowrap;
    }

    /* 注視点のスタイル (仕様: 60px) */
    .fixation-text {
      font-size: 60px;
      font-weight: bold;
      color: #333333;
    }

    /* 刺激（ストループ文字）のスタイル (仕様: 60px) */
    .stimulus-text {
      font-size: 60px;
      font-weight: bold;
      user-select: none; /* テキスト選択を防ぐ */
    }

    /* ボタンのカスタマイズ */
    .jspsych-btn {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      font-size: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      background-color: #4A90E2;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .jspsych-btn:hover {
      background-color: #357ABD;
    }
  </style>
</head>
<body>

  <script>
    // GASのウェブアプリURL (★ご自身のURLに書き換えてください)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyePOheB7FDv2uaGeqy80zdj5CVV7H5u27ud8dGKHvMCBGBg5R-HTYxJVQ4D52hykW4qQ/exec";

    // 指数バックオフを用いたデータ送信関数 (CORSを回避しつつ正確なステータスを取得する最新版)
    function sendDataWithExponentialBackoff(csvData, retries = 5, delay = 1000) {
      const displayElement = jsPsych.getDisplayElement();
      
      // GASへの安全な通信パラメータ。Content-Type: text/plain でPreflight(CORS)を回避
      return fetch(GAS_URL, {
        method: "POST",
        redirect: "follow", // GASのリダイレクト(302)を追従するために必須
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({ csv: csvData })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("HTTPエラー ステータス: " + response.status);
        }
        return response.json(); // GASからのJSON返答をパース
      })
      .then(res => {
        // GAS側で書き込みに成功した場合の判定
        if (res.status === "success") {
          displayElement.innerHTML = `
            <div style="text-align:center; margin-top:100px;">
              <h2>データの保存が完了しました。</h2>
              <p>ご協力ありがとうございました。このウィンドウを閉じても構いません。</p>
            </div>
          `;
        } else {
          // GASの実行エラー（スプレッドシートIDの間違いや、書き込み権限エラーなど）
          throw new Error("GASシステムエラー: " + res.message);
        }
      })
      .catch(error => {
        // エラーハンドリング（リトライ処理）
        if (retries > 0) {
          console.warn(`送信に失敗しました。残り再試行回数: ${retries}。 ${delay}ms 後に再試行します...`, error);
          displayElement.innerHTML = `
            <div style="text-align:center; margin-top:100px;">
              <h3>データを送信中...</h3>
              <p style="color: #666666;">接続エラーが発生しました。再接続を試みています（残り試行: ${retries}回）...</p>
              <p style="color: #999999; font-size: 14px;">エラー理由: ${error.message}</p>
            </div>
          `;
          return new Promise(resolve => setTimeout(resolve, delay))
            .then(() => sendDataWithExponentialBackoff(csvData, retries - 1, delay * 2));
        } else {
          // 完全に送信できなかった場合、データを画面に表示して手動バックアップを促す
          console.error("すべての送信試行が失敗しました。", error);
          displayElement.innerHTML = `
            <div style="text-align:center; margin-top:100px; color:red; padding: 20px;">
              <h2>エラー：データの送信に失敗しました</h2>
              <p>理由: ${error.message}</p>
              <p style="color: #333333;">ネットワーク接続を確認の上、以下のテキストボックスからデータをコピーして研究者へお送りください。</p>
              <textarea readonly style="width: 80%; height: 200px; margin-top: 10px; padding: 10px; font-family: monospace;">${csvData}</textarea>
            </div>
          `;
        }
      });
    }

    // jsPsychインスタンスの初期化
    const jsPsych = initJsPsych({
      on_finish: function() {
        // 全画面モードを安全に解除
        try {
          if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
            const exitMethod = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
            if (exitMethod) {
              exitMethod.call(document);
            }
          }
        } catch (e) {
          console.warn("Could not exit fullscreen: ", e);
        }

        // --- 3. データの抽出・整形 ---
        // ユーザーが反応した試行（response）のみを抽出
        const rawResponseData = jsPsych.data.get().filter({ task: 'response' }).values();
        
        // 必要な列だけを抽出した新しい配列を作成
        const formattedData = rawResponseData.map(row => {
          return {
            subject_id: row.subject_id,
            timestamp: row.timestamp,
            word: row.stimulus_text,
            color: row.stimulus_color,
            condition: row.condition,
            rt: row.rt,
            correct: row.correct === 1 ? "true" : "false" // 確実に "true" / "false" の文字列とする
          };
        });

        // JSON配列を安全にCSV文字列に変換する自作コンバーター
        function convertArrayOfObjectsToCSV(dataArray) {
          if (!dataArray || dataArray.length === 0) return "";
          const headers = Object.keys(dataArray[0]);
          const csvRows = [headers.join(",")]; // ヘッダー行を追加
          
          for (const row of dataArray) {
            const values = headers.map(header => {
              const val = row[header] !== undefined && row[header] !== null ? row[header] : "";
              // 値に含まれるダブルクォーテーションを二重にして全体を囲むことで、安全にCSVエスケープ
              const escaped = ('' + val).replace(/"/g, '""');
              return `"${escaped}"`;
            });
            csvRows.push(values.join(","));
          }
          return csvRows.join("\n");
        }

        // 抽出したデータからCSV文字列を生成
        const refinedCsv = convertArrayOfObjectsToCSV(formattedData);

        // 安全なDOM要素取得によるメッセージの書き換えと送信処理の開始
        const displayElement = jsPsych.getDisplayElement();
        displayElement.innerHTML = `
          <div style="text-align:center; margin-top:100px;">
            <h3>実験終了</h3>
            <p>データを集計して安全に送信しています。そのまましばらくお待ちください...</p>
          </div>
        `;

        // バックオフ送信を実行
        sendDataWithExponentialBackoff(refinedCsv);
      }
    });

    // 刺激の定義 (3種類の「文字」 × 3種類の「色」 = 9パターン)
    const stimuli_pool = [
      // 一致条件 (Congruent)
      { text: "赤", color: "red", condition: "congruent", correct_key: "r" },
      { text: "青", color: "blue", condition: "congruent", correct_key: "b" },
      { text: "緑", color: "green", condition: "congruent", correct_key: "g" },
      // 不一致条件 (Incongruent)
      { text: "赤", color: "blue", condition: "incongruent", correct_key: "b" },
      { text: "赤", color: "green", condition: "incongruent", correct_key: "g" },
      { text: "青", color: "red", condition: "incongruent", correct_key: "r" },
      { text: "青", color: "green", condition: "incongruent", correct_key: "g" },
      { text: "緑", color: "red", condition: "incongruent", correct_key: "r" },
      { text: "緑", color: "blue", condition: "incongruent", correct_key: "b" }
    ];

    // デモ用にプールからランダムに10試行をサンプリング (重複あり)
    const selected_stimuli = jsPsych.randomization.sampleWithReplacement(stimuli_pool, 10);

    // タイムラインの初期化
    const timeline = [];

    // --- 1. 参加者情報入力画面の定義 ---
    const participant_id_trial = {
      type: jsPsychSurveyText,
      questions: [
        { 
          prompt: "参加者ID（学籍番号など）を入力してください:", 
          placeholder: "例: 12345678", 
          required: true,
          name: "subject_id"
        }
      ],
      button_label: "次へ進む",
      on_finish: function(data) {
        // 入力値を取得
        const subId = data.response.subject_id;
        const currentTimestamp = new Date().toLocaleString("ja-JP");
        
        // 全ての試行データに共通データとして自動追加されるよう設定
        jsPsych.data.addProperties({
          subject_id: subId,
          timestamp: currentTimestamp
        });
      }
    };
    timeline.push(participant_id_trial);

    // (1) 安全な全画面化試行の定義 (Permissions Policyエラーを完全に回避)
    const fullscreen_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction-text">
          <p>実験を正確に行うため、ブラウザを全画面表示に切り替えます。</p>
          <p>準備ができたら、下のボタンを押してください。</p>
          <p style="font-size: 16px; color: #666666; margin-top: 10px;">
            (※ 埋め込み環境やブラウザの制限により全画面化が禁止されている場合でも、実験は自動的にウィンドウ内で安全に開始されます)
          </p>
          <br>
          <button id="fullscreen-btn" class="jspsych-btn">全画面表示で開始する</button>
        </div>
      `,
      choices: ["NO_KEYS"], // キーボード反応は受け付けない
      on_load: function() {
        // ボタンにイベントリスナーを付与し、非同期で全画面化をリクエスト
        const btn = document.getElementById('fullscreen-btn');
        if (btn) {
          btn.addEventListener('click', function() {
            const element = document.documentElement;
            const requestMethod = element.requestFullscreen || 
                                  element.webkitRequestFullscreen || 
                                  element.mozRequestFullScreen || 
                                  element.msRequestFullscreen;

            if (requestMethod) {
              // 全画面化を試みる
              requestMethod.call(element)
                .then(() => {
                  // 成功したら次の試行（教示）に進む
                  jsPsych.finishTrial();
                })
                .catch((err) => {
                  // Permissions Policyなどにより拒否された場合
                  console.warn("Fullscreen request was rejected by browser permissions policy:", err);
                  // エラーは無視してウィンドウモードのまま次の試行へ進む
                  jsPsych.finishTrial();
                });
            } else {
              // API非対応のブラウザなどの場合
              console.warn("Fullscreen API is not supported on this browser.");
              jsPsych.finishTrial();
            }
          });
        }
      }
    };
    timeline.push(fullscreen_trial);

    // (2) 教示画面の設定
    const instruction_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction-text">
          <p>これから画面に色を表す漢字が、様々な色で表示されます。</p>
          <p>文字の意味ではなく、文字の<strong>「色」</strong>をできるだけ早く正確に答えてください。</p>
          <br>
          <p>赤色の文字なら <kbd>r</kbd> キー</p>
          <p>青色の文字なら <kbd>b</kbd> キー</p>
          <p>緑色の文字なら <kbd>g</kbd> キー</p>
          <br>
          <p>準備ができたら、<strong>スペースキー</strong>を押して課題を開始してください。</p>
        </div>
      `,
      choices: [' '] // スペースキーのみ受け付ける
    };
    timeline.push(instruction_trial);

    // a. 注紙点 (+) の定義 (500ms 表示)
    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation-text">+</div>',
      choices: "NO_KEYS", // 反応は受け付けない
      trial_duration: 500, // 500ms表示
      data: { task: 'fixation' }
    };

    // b. 刺激提示 & c. 試行間隔 (ITI) の定義
    const test_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        // 現在の試行に対応する文字と色を取得してHTMLを生成
        const text = jsPsych.timelineVariable('text');
        const color = jsPsych.timelineVariable('color');
        return `<div class="stimulus-text" style="color: ${color};">${text}</div>`;
      },
      choices: ['r', 'b', 'g'], // 反応キーは r, b, g のみ
      trial_duration: null, // キー入力があるまで無限に表示
      post_trial_gap: 1000, // 試行間隔 (ITI): 1000ms (画面は自動的に空白になります)
      data: {
        task: 'response',
        stimulus_text: jsPsych.timelineVariable('text'),
        stimulus_color: jsPsych.timelineVariable('color'),
        condition: jsPsych.timelineVariable('condition'),
        correct_response: jsPsych.timelineVariable('correct_key')
      },
      on_finish: function(data) {
        // ユーザーが押したキーと正解キーを照合し、正誤判定を記録
        const is_correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.correct = is_correct ? 1 : 0;
      }
    };

    // メイン試行ループ (10回繰り返す)
    const main_loop = {
      timeline: [fixation, test_trial],
      timeline_variables: selected_stimuli
    };
    timeline.push(main_loop);

    // 実験を起動
    jsPsych.run(timeline);
  </script>
</body>
</html>
